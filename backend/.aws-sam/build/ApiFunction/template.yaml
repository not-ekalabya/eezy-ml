AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/app.handler
      Runtime: python3.12
      CodeUri: .
      MemorySize: 1024
      Timeout: 3600

      Events:
        Api:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY